<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .contact-container {
        margin-top: 100px;
        margin-bottom: 100px;
      }
      .contact-info {
        background: #0d6efd;
        color: white;
        border-radius: 15px 0 0 15px;
        padding: 40px;
      }
      .contact-form {
        background: white;
        border-radius: 0 15px 15px 0;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      @media (max-width: 768px) {
        .contact-info {
          border-radius: 15px 15px 0 0;
        }
        .contact-form {
          border-radius: 0 0 15px 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container contact-container">
      <div class="row g-0">
        <div
          class="col-md-5 contact-info d-flex flex-column justify-content-between"
        >
          <div>
            <h2 class="fw-bold">Get in touch</h2>
            <p class="text-white-50">
              Have a question or just want to say hi? Drop us a message and
              we'll get back to you within 24 hours.
            </p>

            <div class="mt-5">
              <div class="d-flex mb-4">
                <i class="bi bi-geo-alt-fill me-3 fs-4"></i>
                <p class="mb-0">123 Innovation Way, Tech City, 90210</p>
              </div>
              <div class="d-flex mb-4">
                <i class="bi bi-telephone-fill me-3 fs-4"></i>
                <p class="mb-0">+1 (555) 000-1234</p>
              </div>
              <div class="d-flex mb-4">
                <i class="bi bi-envelope-at-fill me-3 fs-4"></i>
                <p class="mb-0">hello@yourbrand.com</p>
              </div>
            </div>
          </div>

          <div class="social-links mt-4">
            <a href="#" class="text-white me-3"
              ><i class="bi bi-facebook fs-5"></i
            ></a>
            <a href="#" class="text-white me-3"
              ><i class="bi bi-twitter-x fs-5"></i
            ></a>
            <a href="#" class="text-white me-3"
              ><i class="bi bi-linkedin fs-5"></i
            ></a>
            <a href="#" class="text-white"
              ><i class="bi bi-instagram fs-5"></i
            ></a>
          </div>
        </div>

        <div class="col-md-7 contact-form">
          <form id="contactForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">First Name</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="John"
                  required
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Last Name</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Doe"
                  required
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email address</label>
              <input
                type="email"
                class="form-control"
                placeholder="name@example.com"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Subject</label>
              <select class="form-select">
                <option selected>General Inquiry</option>
                <option value="1">Support</option>
                <option value="2">Sales</option>
                <option value="3">Feedback</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Message</label>
              <textarea
                class="form-control"
                rows="5"
                placeholder="Tell us how we can help..."
                required
              ></textarea>
            </div>
            <button
              type="submit"
              class="btn btn-primary btn-lg w-100 shadow-sm"
            >
              Send Message
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
